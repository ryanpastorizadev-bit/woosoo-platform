# =============================================================================
# Woosoo Platform — Production Orchestration (PLATFORM-ROOT AUTHORITY)
# =============================================================================
# Run ALL docker compose operations from the platform repo root
# (E:\Projects\woosoo-platform), e.g.:
#
#   docker compose --env-file ./woosoo-nexus/.env -f compose.yaml up -d --build
#
# Topology: this is a 3-repo SIBLING model, NOT a monorepo.
#   woosoo-platform/      <- this repo: governance + orchestration (compose, docker/, scripts)
#   ├── woosoo-nexus/     <- independent repo: Laravel app (its own remote)
#   └── tablet-ordering-pwa/  <- independent repo: Nuxt PWA (its own remote)
# Build contexts point at the sibling app dirs on disk; app code is versioned
# in its own repo and pulled in place by scripts/deployment/deploy.sh.
#
# `name:` is pinned to "woosoo-nexus" on purpose: it keeps the compose project
# name (and therefore container / volume / network names) identical to the
# legacy woosoo-nexus/compose.yaml, so existing Pi data volumes
# (woosoo-nexus_mysql_data, _redis_data, _storage_data) are NOT orphaned.
#
# Interpolation (${PUBLIC_HOST}, ${REVERB_APP_KEY}, ...) is read from the file
# passed via --env-file (./woosoo-nexus/.env), NOT from `env_file:`. Always
# invoke compose with --env-file ./woosoo-nexus/.env (baked into the deploy
# scripts' WOOSOO_DOCKER_COMPOSE default).
#
# Source bind-mounts (./woosoo-nexus:/var/www/html) are used for dev/staging.
# For fully immutable production, remove the bind-mounts and rely on built
# image contents + the named 'storage_data' volume.
#
# MySQL is NOT published to the host (matches committed woosoo-nexus authority).
# App/queue/scheduler reach it over the internal `woosoo` network. Single
# source of truth, no override files.
# =============================================================================

name: woosoo-nexus

services:

  # ── Reverse proxy + TLS termination ──────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"       # HTTP → HTTPS redirect
      - "443:443"     # Woosoo Nexus admin panel + Reverb WebSocket
      - "4443:4443"   # Tablet Ordering PWA
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/certs:/etc/nginx/certs:ro
      - ./woosoo-nexus:/var/www/html:ro
      - storage_data:/var/www/html/storage:ro
    depends_on:
      - app
      - reverb
      - tablet-pwa
    networks:
      - woosoo

  # ── Laravel app (PHP-FPM) ─────────────────────────────────────────────
  app:
    build:
      context: ./woosoo-nexus
      dockerfile: Dockerfile
    pull_policy: build
    restart: unless-stopped
    env_file: ./woosoo-nexus/.env
    environment:
      REVERB_BROADCAST_HOST: ${PUBLIC_HOST:-woosoo.local}
    volumes:
      - ./woosoo-nexus:/var/www/html  # dev/staging: bind-mount; remove for immutable production image
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini:ro
      - storage_data:/var/www/html/storage
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php", "-r", "if (!($$s=fsockopen('127.0.0.1',9000,$$e,$$m,3))) exit(1);fclose($$s);"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s
    mem_limit: 768m
    mem_reservation: 384m
    networks:
      - woosoo

  # ── Queue worker ──────────────────────────────────────────────────────
  queue:
    build:
      context: ./woosoo-nexus
      dockerfile: Dockerfile
    pull_policy: build
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "redis", "--sleep=3", "--tries=1", "--timeout=30", "--max-jobs=250", "--max-time=900", "--memory=256"]
    env_file:
      - ./woosoo-nexus/.env
      - path: ./woosoo-nexus/.env.docker
        required: false
    volumes:
      - ./woosoo-nexus:/var/www/html
      - storage_data:/var/www/html/storage
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: 512m
    mem_reservation: 256m
    networks:
      - woosoo

  # ── Task scheduler ────────────────────────────────────────────────────
  scheduler:
    build:
      context: ./woosoo-nexus
      dockerfile: Dockerfile
    pull_policy: build
    restart: unless-stopped
    command: ["php", "artisan", "schedule:work"]
    env_file:
      - ./woosoo-nexus/.env
      - path: ./woosoo-nexus/.env.docker
        required: false
    volumes:
      - ./woosoo-nexus:/var/www/html
      - storage_data:/var/www/html/storage
    depends_on:
      app:
        condition: service_healthy
    mem_limit: 512m
    mem_reservation: 256m
    memswap_limit: 768m
    networks:
      - woosoo

  # ── Reverb WebSocket server ───────────────────────────────────────────
  reverb:
    build:
      context: ./woosoo-nexus
      dockerfile: Dockerfile
    pull_policy: build
    restart: unless-stopped
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8080", "--no-interaction"]
    env_file: ./woosoo-nexus/.env
    environment:
      REVERB_BROADCAST_HOST: ${PUBLIC_HOST:-woosoo.local}
    volumes:
      - ./woosoo-nexus:/var/www/html
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - woosoo

  # ── Tablet Ordering PWA ───────────────────────────────────────────────
  # Built from the sibling tablet-ordering-pwa repo (independent git repo).
  # context is platform-root-relative → unambiguous regardless of CWD.
  tablet-pwa:
    build:
      context: ./tablet-ordering-pwa
      dockerfile: ${TABLET_DOCKERFILE:-Dockerfile.prod}
      args:
        BUILD_SHA: ${TABLET_BUILD_SHA:-unknown}
        BUILD_BRANCH: ${TABLET_BUILD_BRANCH:-unknown}
        BUILD_TIME: ${TABLET_BUILD_TIME:-unknown}
        NUXT_PUBLIC_BROADCAST_CONNECTION: reverb
        NUXT_PUBLIC_REVERB_APP_ID: ${REVERB_APP_ID:-woosoo}
        NUXT_PUBLIC_REVERB_APP_KEY: ${REVERB_APP_KEY}
        NUXT_PUBLIC_REVERB_HOST: ${PUBLIC_HOST:-woosoo.local}
        NUXT_PUBLIC_REVERB_PORT: "443"
        NUXT_PUBLIC_REVERB_SCHEME: https
        NUXT_PUBLIC_REVERB_PATH: /app
    pull_policy: build
    restart: unless-stopped
    env_file: ./woosoo-nexus/.env
    environment:
      NODE_ENV: production
      APP_RUNTIME_API_BASE_URL: https://${PUBLIC_HOST:-woosoo.local}/api
      APP_RUNTIME_REVERB_HOST: ${PUBLIC_HOST:-woosoo.local}
      APP_RUNTIME_REVERB_APP_KEY: ${REVERB_APP_KEY:-your_reverb_key_here}
      APP_RUNTIME_REVERB_PORT: "443"
      APP_RUNTIME_REVERB_SCHEME: https
      APP_RUNTIME_REVERB_PATH: /app

      APP_RUNTIME_BUILD_SHA: ${TABLET_BUILD_SHA:-unknown}
      APP_RUNTIME_BUILD_BRANCH: ${TABLET_BUILD_BRANCH:-unknown}
      APP_RUNTIME_BUILD_TIME: ${TABLET_BUILD_TIME:-unknown}
      APP_RUNTIME_BUILD_FINGERPRINT: ${TABLET_BUILD_FINGERPRINT:-unknown}
      APP_RUNTIME_DOCKERFILE: ${TABLET_DOCKERFILE:-Dockerfile.prod}

      NUXT_PUBLIC_API_BASE_URL: https://${PUBLIC_HOST:-woosoo.local}/api
      NUXT_PUBLIC_BROADCAST_CONNECTION: reverb
      NUXT_PUBLIC_REVERB_APP_ID: ${REVERB_APP_ID:-woosoo}
      NUXT_PUBLIC_REVERB_APP_KEY: ${REVERB_APP_KEY:-woosoo}
      NUXT_PUBLIC_REVERB_HOST: ${PUBLIC_HOST:-woosoo.local}
      NUXT_PUBLIC_REVERB_PORT: 443
      NUXT_PUBLIC_REVERB_SCHEME: https
      NUXT_PUBLIC_REVERB_PATH: /app
      MAIN_API_URL: https://${PUBLIC_HOST:-woosoo.local}
      NUXT_PUBLIC_PUSHER_KEY: ${REVERB_APP_KEY}
      NUXT_PUBLIC_PUSHER_CLUSTER: mt1
      NUXT_PUBLIC_DEVICE_AUTH_PASSCODE: ${DEVICE_AUTH_PASSCODE:-}
    networks:
      - woosoo

  # ── MySQL ─────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    # No published port: app/queue/scheduler reach mysql over the internal
    # `woosoo` network. Matches the committed woosoo-nexus authority (the
    # 3306:3306 publish was a local-only experiment, never committed).
    # For ad-hoc host access use: docker compose exec mysql mysql -u...
    mem_limit: 640m
    mem_reservation: 384m
    command:
      - --max_connections=200
      - --wait_timeout=300
      - --interactive_timeout=300
      - --innodb_buffer_pool_size=256M
      - --innodb_log_buffer_size=16M
      - --innodb_flush_log_at_trx_commit=2
      - --innodb_flush_method=O_DIRECT
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_DATABASE:-woosoo}
      MYSQL_USER: ${DB_USERNAME:-woosoo}
      MYSQL_PASSWORD: ${DB_PASSWORD:-change_this_password}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - woosoo

  # ── Redis ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # maxmemory-policy: volatile-lru evicts TTL-keyed entries (Pulse buckets, sessions)
    # first; never evicts permanent queue/lock keys (no TTL).
    command: redis-server --appendonly yes --maxmemory 400mb --maxmemory-policy volatile-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    mem_limit: 512m
    mem_reservation: 256m
    networks:
      - woosoo

volumes:
  mysql_data:
  redis_data:
  storage_data:

networks:
  woosoo:
    driver: bridge
