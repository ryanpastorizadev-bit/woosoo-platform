name: Agent Task
description: A task to be run through the Woosoo Lite 4-agent operating system.
title: "[agent] <short task slug>"
labels: ["agent-task"]
body:
  - type: textarea
    id: request
    attributes:
      label: Request
      description: What needs to be done, and why.
    validations:
      required: true
  - type: dropdown
    id: affected-app
    attributes:
      label: Affected App
      options:
        - woosoo-nexus
        - tablet-ordering-pwa
        - woosoo-print-bridge
        - docs
        - infra
        - multiple-SPLIT_REQUIRED
    validations:
      required: true
  - type: dropdown
    id: tier
    attributes:
      label: Tier
      description: "1 = trivial, 2 = standard (default), 3 = high-risk"
      options:
        - "1"
        - "2"
        - "3"
    validations:
      required: true
  - type: textarea
    id: success-criteria
    attributes:
      label: Success Criteria
      description: How we will know this is actually done (working, verified).
    validations:
      required: true
  - type: input
    id: case-file
    attributes:
      label: Linked Case File
      description: "Path under docs/cases/<task-slug>.md (must exist before the Executioner can approve)."
      placeholder: docs/cases/<task-slug>.md
    validations:
      required: true
  - type: checkboxes
    id: required-gates
    attributes:
      label: Required Gates
      options:
        - label: Contrarian review completed
        - label: Branch created (agent/<slug>)
        - label: Specialist completed
        - label: Tests/build/lint run by Verifier
        - label: Executioner verdict recorded
